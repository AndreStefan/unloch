name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, develop]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # ── Backend: Lint + Test ──────────────────────────────

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: unloch_test
          POSTGRES_USER: unloch
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://unloch:testpass@localhost:5432/unloch_test

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://unloch:testpass@localhost:5432/unloch_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-at-least-16-chars
          AI_SERVICE_URL: http://localhost:8000

  # ── AI Service: Lint ──────────────────────────────────

  ai-service-lint:
    name: AI Service Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ai-service

  # ── Dashboard: Lint + Build ───────────────────────────

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Lint
        run: npm run lint
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard
        env:
          VITE_API_URL: https://api.unloch.me

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7

  # ── Patient App: Lint + Build ─────────────────────────

  patient-app-build:
    name: Patient App Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: patient-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: patient-app

      - name: Lint
        run: npm run lint
        working-directory: patient-app

      - name: Build
        run: npm run build
        working-directory: patient-app
        env:
          VITE_API_URL: https://api.unloch.me
          VITE_WS_URL: wss://api.unloch.me

      - uses: actions/upload-artifact@v4
        with:
          name: patient-app-dist
          path: patient-app/dist/
          retention-days: 7

  # ── Docker Build + Push to ECR ────────────────────────

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, ai-service-lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -f infra/docker/backend.Dockerfile \
            -t $ECR_REGISTRY/unloch-production-backend:${{ github.sha }} .
          docker push $ECR_REGISTRY/unloch-production-backend:${{ github.sha }}

      - name: Build and push ai-service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -f infra/docker/ai-service.Dockerfile \
            -t $ECR_REGISTRY/unloch-production-ai-service:${{ github.sha }} .
          docker push $ECR_REGISTRY/unloch-production-ai-service:${{ github.sha }}
